repos:
  - repo: local
    hooks:
#      - id: black
#        name: black
#        entry: poetry run black
#        language: python
#        args: [ "--line-length=80" ]

      - id: isort
        name: Isort
        entry: poetry run isort
        language: python
        types_or: [ python, pyi ]

      - id: ruff-format
        name: Run Ruff Formatter
        entry: poetry run ruff format
        language: python
        types_or: [ python, pyi ]

      - id: mypy
        name: mypy
        entry: poetry run mypy
        language: python
        types_or: [ python, pyi ]
        args: [ "--check-untyped-defs" ]

      - id: pylint
        name: pylint
        entry: pylint
        language: python
        types_or: [ python, pyi ]
        args: ["--disable", "missing-module-docstring,missing-class-docstring,missing-function-docstring"]

      - id: codespell
        name: codespell
        entry: codespell
        language: python
        types_or: [ python, pyi ]

      - id: pyright
        name: pyright
        entry: poetry run pyright
        language: python
        types_or: [ python, pyi ]
